<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mets Personal Studio — Avaliação Integrada de Estilo de Vida</title>
<link rel="icon" href="assets/icon.PNG">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===================== TELA DE LOGIN ===================== -->
<div id="login-screen" class="login-screen">
  <div class="login-box">
    <img src="assets/logo_mets.png" alt="Mets Personal Studio" class="login-logo">
    <h1>Avaliação Integrada de Estilo de Vida</h1>
    <button id="btn-login-google" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.4 29.3 35 24 35c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.2-.1-2.4-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 7.1 29.6 5 24 5c-7.5 0-14 4.2-17.7 10.4z"/><path fill="#4CAF50" d="M24 43c5.4 0 10.3-2.1 14-5.5l-6.5-5.5C29.4 33.7 26.9 35 24 35c-5.2 0-9.7-3.5-11.2-8.3l-6.6 5C9.9 38.6 16.4 43 24 43z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.5l6.5 5.5C41.5 36 44 30.5 44 24c0-1.2-.1-2.4-.4-3.5z"/></svg>
      Entrar com Google
    </button>
    <p id="login-erro" class="erro"></p>
  </div>
</div>

<!-- ===================== APLICAÇÃO ===================== -->
<div id="app-screen" class="app-screen hidden">
  <header class="app-header">
    <img src="assets/logo_mets.png" alt="Mets Personal Studio" class="app-logo">
    <nav class="tabs">
      <button class="tab-btn active" data-tab="tab-pacientes">Pacientes</button>
      <button class="tab-btn" data-tab="tab-nova">Nova Avaliação</button>
      <button class="tab-btn" data-tab="tab-historico">Histórico / Relatório</button>
    </nav>
    <button id="btn-logout" class="btn-logout">Sair</button>
  </header>

  <!-- ---------- Aba Pacientes ---------- -->
  <section id="tab-pacientes" class="tab-panel">
    <h2>Cadastrar novo paciente</h2>
    <form id="form-novo-paciente" class="form-grid">
      <div class="field-row"><label for="pac-nome">Nome</label><input type="text" id="pac-nome" required></div>
      <div class="field-row"><label for="pac-nascimento">Data de nascimento</label><input type="date" id="pac-nascimento"></div>
      <div class="field-row"><label for="pac-sexo">Sexo</label>
        <select id="pac-sexo"><option value="">-</option><option value="F">Feminino</option><option value="M">Masculino</option></select>
      </div>
      <div class="field-row"><label for="pac-objetivo">Objetivo inicial</label><input type="text" id="pac-objetivo"></div>
      <button type="submit">Cadastrar</button>
    </form>

    <h2>Pacientes cadastrados</h2>
    <div class="table-scroll">
      <table id="tabela-pacientes" class="tbl">
        <thead><tr><th>Nome</th><th>Nascimento</th><th>Sexo</th><th>Objetivo</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <!-- ---------- Aba Nova Avaliação ---------- -->
  <section id="tab-nova" class="tab-panel hidden">
    <div class="toolbar">
      <label for="select-paciente-nova">Paciente:</label>
      <select id="select-paciente-nova"></select>
      <button id="btn-carregar-anterior" type="button">Carregar dados anteriores</button>
      <label for="data-avaliacao">Data da avaliação:</label>
      <input type="date" id="data-avaliacao">
      <button id="btn-calcular-salvar" type="button" class="btn-primary">Calcular e Salvar Avaliação</button>
      <button id="btn-cancelar-edicao" type="button" class="hidden">Cancelar edição</button>
    </div>
    <p id="status-nova" class="status"></p>
    <p id="aviso-edicao" class="aviso-edicao hidden"></p>
    <div id="form-container" class="form-container"></div>
  </section>

  <!-- ---------- Aba Histórico / Relatório ---------- -->
  <section id="tab-historico" class="tab-panel hidden">
    <div class="toolbar">
      <label for="select-paciente-hist">Paciente:</label>
      <select id="select-paciente-hist"></select>
      <button id="btn-carregar-historico" type="button">Carregar histórico</button>
    </div>
    <div class="toolbar">
      <span class="toolbar-label">Comparar avaliação atual com:</span>
      <label class="radio-inline"><input type="radio" name="modo-comparacao" value="anterior" checked> Avaliação anterior</label>
      <label class="radio-inline"><input type="radio" name="modo-comparacao" value="primeira"> Primeira avaliação (baseline)</label>
      <button id="btn-gerar-relatorio" type="button" class="btn-primary">Gerar Relatório (PDF)</button>
    </div>
    <div class="table-scroll">
      <table id="tabela-historico" class="tbl">
        <thead><tr><th>#</th><th>Data</th><th>IPAQ (MET-min)</th><th>Sono</th><th>DASS Depressão</th><th>Ações</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </section>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
